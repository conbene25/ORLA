<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Orla — Open Access Self-Assessment</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ink:#1a1a2e;--paper:#f7f5f0;--teal:#007a6e;--teal-light:#e0f2f0;
  --teal-mid:#c2e8e4;--teal-dark:#005c52;--gold:#c9973a;--muted:#6b7280;
  --surface:#ffffff;--border:#e2ddd6;--shadow:0 2px 16px rgba(0,0,0,0.07);--radius:14px;
}
body{font-family:'Inter',sans-serif;background:var(--paper);color:var(--ink);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:32px 20px 80px;}

.header{display:flex;align-items:center;gap:12px;margin-bottom:36px;width:100%;max-width:720px;}
.orla-mark{width:42px;height:42px;border-radius:50%;
  background:linear-gradient(135deg,var(--teal),var(--teal-dark));
  display:flex;align-items:center;justify-content:center;
  font-family:'DM Serif Display',serif;color:white;font-size:19px;
  box-shadow:0 2px 8px rgba(0,122,110,0.3);flex-shrink:0;}
.header-title{font-family:'DM Serif Display',serif;font-size:17px;color:var(--ink);line-height:1.2;}
.header-title span{color:var(--teal);}
.header-sub{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:2px;}

.progress-wrap{width:100%;max-width:720px;margin-bottom:28px;}
.progress-meta{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:8px;}
.progress-track{height:4px;background:var(--border);border-radius:99px;overflow:hidden;}
.progress-fill{height:100%;background:var(--teal);border-radius:99px;transition:width .4s cubic-bezier(.4,0,.2,1);}

.section-label{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;
  letter-spacing:.06em;text-transform:uppercase;color:var(--teal);
  background:var(--teal-light);border:1px solid var(--teal-mid);
  padding:4px 12px;border-radius:99px;margin-bottom:14px;}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:32px;width:100%;max-width:720px;box-shadow:var(--shadow);animation:slideUp .35s ease;}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.question-number{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.06em;
  text-transform:uppercase;margin-bottom:10px;}
.question-text{font-family:'DM Serif Display',serif;font-size:21px;line-height:1.35;
  color:var(--ink);margin-bottom:6px;}
.question-hint{font-size:13px;color:var(--muted);margin-bottom:22px;line-height:1.5;}

/* Radio options */
.options{display:flex;flex-direction:column;gap:9px;}
.option{display:flex;align-items:flex-start;gap:14px;padding:13px 16px;
  background:var(--paper);border:1.5px solid var(--border);border-radius:10px;
  cursor:pointer;transition:all .18s ease;text-align:left;width:100%;
  font-family:'Inter',sans-serif;}
.option:hover{border-color:var(--teal-mid);background:var(--teal-light);}
.option.selected{border-color:var(--teal);background:var(--teal-light);}
.option-dot{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);
  flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .18s;}
.option.selected .option-dot{border-color:var(--teal);background:var(--teal);}
.option.selected .option-dot::after{content:'';width:8px;height:8px;border-radius:50%;background:white;}
.option-label{font-size:14px;line-height:1.5;color:var(--ink);}
.option-sub{font-size:12px;color:var(--muted);margin-top:2px;}

/* Checkbox options (multi-select) */
.option.checkbox .option-dot{border-radius:4px;}
.option.checkbox.selected .option-dot::after{content:'✓';width:auto;height:auto;
  border-radius:0;background:transparent;color:white;font-size:12px;font-weight:700;}

/* Slider */
.slider-wrap{margin:8px 0 20px;}
.slider-labels{display:flex;justify-content:space-between;font-size:11px;
  color:var(--muted);margin-bottom:6px;}
.slider-value-display{text-align:center;font-size:28px;font-family:'DM Serif Display',serif;
  color:var(--teal);margin-bottom:10px;font-weight:400;}
.slider-value-display span{font-size:14px;color:var(--muted);font-family:'Inter',sans-serif;}
input[type=range]{-webkit-appearance:none;width:100%;height:6px;border-radius:99px;
  background:var(--border);outline:none;cursor:pointer;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;
  border-radius:50%;background:var(--teal);cursor:pointer;
  box-shadow:0 2px 6px rgba(0,122,110,0.3);transition:transform .15s;}
input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.15);}
.slider-bands{display:flex;gap:4px;margin-top:12px;}
.slider-band{flex:1;padding:6px 4px;border-radius:6px;text-align:center;
  font-size:10px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;
  border:1px solid var(--border);color:var(--muted);background:var(--paper);transition:all .2s;}
.slider-band.active{background:var(--teal);color:white;border-color:var(--teal);}

/* Open text */
.open-text-wrap{margin-top:6px;}
.open-text-label{font-size:13px;color:var(--muted);margin-bottom:8px;}
textarea.open-text{width:100%;font-family:'Inter',sans-serif;font-size:14px;
  color:var(--ink);background:var(--paper);border:1.5px solid var(--border);
  border-radius:10px;padding:13px 15px;resize:vertical;min-height:90px;
  outline:none;transition:border-color .2s;line-height:1.55;}
textarea.open-text:focus{border-color:var(--teal);}
textarea.open-text::placeholder{color:#aaa;}
.open-text-optional{font-size:11px;color:var(--muted);margin-top:5px;font-style:italic;}

/* Time availability */
.time-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.time-option{padding:14px;border:1.5px solid var(--border);border-radius:10px;
  cursor:pointer;text-align:center;background:var(--paper);transition:all .18s;
  font-family:'Inter',sans-serif;}
.time-option:hover{border-color:var(--teal-mid);background:var(--teal-light);}
.time-option.selected{border-color:var(--teal);background:var(--teal-light);}
.time-option-icon{font-size:22px;margin-bottom:6px;}
.time-option-label{font-size:13.5px;font-weight:600;color:var(--ink);}
.time-option-sub{font-size:11.5px;color:var(--muted);margin-top:3px;line-height:1.4;}

.nav{display:flex;justify-content:space-between;align-items:center;margin-top:24px;}
.btn{font-family:'Inter',sans-serif;font-size:14px;font-weight:600;
  padding:11px 24px;border-radius:10px;border:none;cursor:pointer;transition:all .18s ease;}
.btn-primary{background:var(--teal);color:white;}
.btn-primary:hover{background:var(--teal-dark);transform:translateY(-1px);}
.btn-primary:disabled{background:var(--border);color:var(--muted);cursor:not-allowed;transform:none;}
.btn-ghost{background:transparent;color:var(--muted);border:1.5px solid var(--border);}
.btn-ghost:hover{border-color:var(--teal-mid);color:var(--teal);}

/* ===== DECISION MATRIX VIEW ===== */
.matrix-wrap{width:100%;max-width:720px;animation:slideUp .35s ease;}
.matrix-title{font-family:'DM Serif Display',serif;font-size:22px;color:var(--ink);margin-bottom:6px;}
.matrix-sub{font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.5;}
.matrix-table{width:100%;border-collapse:collapse;background:var(--surface);
  border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);
  border:1px solid var(--border);}
.matrix-table th{background:var(--ink);color:white;padding:11px 14px;
  font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;text-align:left;}
.matrix-table td{padding:11px 14px;border-bottom:1px solid var(--border);
  font-size:13px;line-height:1.45;vertical-align:top;}
.matrix-table tr:last-child td{border-bottom:none;}
.matrix-table tr.my-row td{background:var(--teal-light);font-weight:500;}
.matrix-table tr.my-row td:first-child{border-left:3px solid var(--teal);}
.stage-pill-sm{display:inline-block;padding:2px 9px;border-radius:99px;
  font-size:11px;font-weight:600;white-space:nowrap;}
.dim-dot{display:inline-block;width:9px;height:9px;border-radius:50%;
  margin-right:5px;vertical-align:middle;}
.matrix-back-btn{margin-top:14px;display:inline-flex;align-items:center;gap:6px;
  background:none;border:none;font-family:'Inter',sans-serif;font-size:13px;
  color:var(--muted);cursor:pointer;padding:0;}
.matrix-back-btn:hover{color:var(--teal);}

/* ===== RESULTS ===== */
.results-card{background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);width:100%;max-width:720px;
  box-shadow:var(--shadow);overflow:hidden;animation:slideUp .4s ease;}
.results-hero{background:linear-gradient(135deg,var(--teal) 0%,var(--teal-dark) 100%);
  padding:36px 32px;color:white;}
.results-eyebrow{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  opacity:.75;margin-bottom:10px;}
.results-stage-name{font-family:'DM Serif Display',serif;font-size:30px;line-height:1.2;margin-bottom:10px;}
.results-stage-desc{font-size:14.5px;line-height:1.65;opacity:.9;max-width:500px;}
.results-body{padding:32px;}
.results-section-title{font-size:11px;font-weight:600;letter-spacing:.07em;
  text-transform:uppercase;color:var(--muted);margin-bottom:14px;}
.stage-map{display:flex;gap:0;margin-bottom:28px;border:1px solid var(--border);
  border-radius:10px;overflow:hidden;}
.stage-step{flex:1;padding:10px 5px;text-align:center;font-size:10px;font-weight:600;
  letter-spacing:.03em;text-transform:uppercase;color:var(--muted);background:var(--paper);
  border-right:1px solid var(--border);transition:all .2s;line-height:1.3;}
.stage-step:last-child{border-right:none;}
.stage-step.active{background:var(--teal);color:white;}
.stage-step.done{background:var(--teal-light);color:var(--teal);}
.stage-num{font-size:16px;display:block;margin-bottom:3px;}
.priorities{display:flex;flex-direction:column;gap:10px;margin-bottom:28px;}
.priority-item{display:flex;gap:12px;align-items:flex-start;padding:13px 15px;
  background:var(--paper);border:1px solid var(--border);border-radius:10px;}
.priority-icon{font-size:18px;flex-shrink:0;margin-top:1px;}
.priority-title{font-size:14px;font-weight:600;color:var(--ink);margin-bottom:2px;}
.priority-desc{font-size:12.5px;color:var(--muted);line-height:1.4;}
.resource-list{display:flex;flex-direction:column;gap:8px;margin-bottom:28px;}
.resource-item{display:flex;gap:10px;align-items:flex-start;padding:11px 13px;
  background:var(--teal-light);border:1px solid var(--teal-mid);border-radius:9px;}
.resource-icon{font-size:15px;flex-shrink:0;margin-top:2px;}
.resource-name{font-size:13.5px;font-weight:600;color:var(--teal);
  text-decoration:none;display:block;}
.resource-name:hover{text-decoration:underline;}
.resource-why{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.4;}
.profile-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:28px;}
.profile-chip{font-size:12px;font-weight:500;padding:5px 12px;border-radius:99px;
  background:var(--paper);border:1px solid var(--border);color:var(--muted);}
.profile-chip.highlight{background:var(--teal-light);border-color:var(--teal-mid);color:var(--teal);}

/* Open-ended summary box */
.reflection-box{background:var(--paper);border:1px solid var(--border);border-radius:10px;
  padding:16px;margin-bottom:28px;}
.reflection-box h4{font-size:12px;font-weight:600;text-transform:uppercase;
  letter-spacing:.05em;color:var(--muted);margin-bottom:10px;}
.reflection-item{font-size:13px;line-height:1.55;color:var(--ink);
  padding:7px 0;border-bottom:1px solid var(--border);}
.reflection-item:last-child{border-bottom:none;padding-bottom:0;}
.reflection-q{font-weight:600;font-size:11.5px;color:var(--muted);
  text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px;}

.view-matrix-btn{display:inline-flex;align-items:center;gap:7px;
  background:var(--paper);border:1.5px solid var(--border);color:var(--muted);
  font-family:'Inter',sans-serif;font-size:13px;font-weight:600;
  padding:9px 16px;border-radius:9px;cursor:pointer;margin-bottom:28px;transition:all .18s;}
.view-matrix-btn:hover{border-color:var(--teal-mid);color:var(--teal);}

.orla-cta{background:linear-gradient(135deg,#1a1a2e 0%,#2d2d4e 100%);
  border-radius:12px;padding:22px 24px;display:flex;align-items:center;
  gap:16px;margin-top:4px;}
.cta-avatar{width:44px;height:44px;border-radius:50%;
  background:linear-gradient(135deg,var(--teal),var(--teal-dark));
  display:flex;align-items:center;justify-content:center;
  font-family:'DM Serif Display',serif;color:white;font-size:20px;flex-shrink:0;}
.cta-text{flex:1;}
.cta-title{font-size:14px;font-weight:600;color:white;margin-bottom:3px;}
.cta-desc{font-size:12.5px;color:rgba(255,255,255,.6);line-height:1.4;}
.cta-btn{background:var(--teal);color:white;font-family:'Inter',sans-serif;
  font-size:13px;font-weight:600;padding:10px 18px;border-radius:8px;
  border:none;cursor:pointer;white-space:nowrap;transition:all .18s;flex-shrink:0;}
.cta-btn:hover{background:var(--teal-dark);}
.restart-btn{display:block;text-align:center;margin-top:20px;font-size:13px;
  color:var(--muted);background:none;border:none;cursor:pointer;
  font-family:'Inter',sans-serif;text-decoration:underline;text-underline-offset:2px;}
.restart-btn:hover{color:var(--teal);}
</style>
</head>
<body>
<div class="header">
  <div class="orla-mark">O</div>
  <div>
    <div class="header-title"><span>Orla</span> — Open Access Self-Assessment</div>
    <div class="header-sub">Based on the CC Open Heritage Companion · 6-Stage Framework</div>
  </div>
</div>
<div class="progress-wrap" id="progress-wrap">
  <div class="progress-meta">
    <span id="progress-label">Section 1 of 6</span>
    <span id="progress-pct">0%</span>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
</div>
<div id="app"></div>

<script>
// ─── SECTIONS ───────────────────────────────────────────────
const SECTIONS = [
  {id:'org',       label:'Your Organisation'},
  {id:'collection',label:'Your Collection'},
  {id:'digital',   label:'Digitisation Status'},
  {id:'rights',    label:'Rights & Licensing'},
  {id:'technical', label:'Technical Capacity'},
  {id:'openness',  label:'Openness & Barriers'},
];

// ─── QUESTIONS ──────────────────────────────────────────────
// types: 'radio' | 'multi' | 'slider' | 'open' | 'time'
const QUESTIONS = [

  // ── SECTION 0: Organisation ──
  {
    section:0, id:'org_type', type:'multi',
    text:'What best describes your organisation?',
    hint:'Select all that apply — many organisations wear more than one hat.',
    options:[
      {value:'museum',     label:'Museum',          sub:'General, art, history, science, natural history'},
      {value:'gallery',    label:'Gallery',          sub:'Public or commercial art gallery'},
      {value:'library',    label:'Library',          sub:'Public, academic, national, or specialist'},
      {value:'archive',    label:'Archive',          sub:'Standalone archive or records office'},
      {value:'museum_archive', label:'Archive within a museum or gallery', sub:'Hybrid institutional setting'},
      {value:'community',  label:'Community or grassroots organisation', sub:'Heritage groups, cultural centres, oral history projects'},
      {value:'individual', label:'Individual practitioner or researcher', sub:'Independent, freelance, or academic'},
      {value:'other',      label:'Other',            sub:''},
    ]
  },
  {
    section:0, id:'org_mission', type:'open',
    text:'In a sentence or two, what is your organisation\'s core mission?',
    hint:'This helps Orla understand your context and priorities.',
    placeholder:'e.g. We preserve and share the cultural heritage of our region with local communities and researchers…',
    optional:true,
  },
  {
    section:0, id:'org_size', type:'radio',
    text:'How large is your organisation?',
    hint:'Staff capacity directly shapes what\'s realistic to tackle first.',
    options:[
      {value:'solo',   label:'Just me',              sub:'Solo practitioner or one-person operation'},
      {value:'small',  label:'Small (2–10 people)',  sub:''},
      {value:'medium', label:'Medium (11–50 people)',sub:''},
      {value:'large',  label:'Large (50+ people)',   sub:''},
    ]
  },
  {
    section:0, id:'team_time', type:'time',
    text:'How much capacity does your team realistically have for open access work right now?',
    hint:'Be honest — this shapes what\'s achievable in the short term.',
    options:[
      {value:'none',    icon:'😓', label:'Very little',      sub:'No dedicated time; would need to carve it out'},
      {value:'low',     icon:'🌱', label:'A few hours/month', sub:'Open access is a side project alongside core work'},
      {value:'moderate',icon:'⏳', label:'A few hours/week',  sub:'Some regular capacity to make progress'},
      {value:'high',    icon:'🚀', label:'A significant part of our work', sub:'Open access is a current priority'},
    ]
  },

  // ── SECTION 1: Collection ──
  {
    section:1, id:'collection_type', type:'multi',
    text:'What types of assets make up your collection?',
    hint:'Select all that apply.',
    options:[
      {value:'photos',    label:'Photographs',             sub:'Analogue or born-digital'},
      {value:'artworks',  label:'2D artworks',             sub:'Paintings, drawings, prints, maps'},
      {value:'documents', label:'Documents & manuscripts', sub:'Letters, records, publications, ephemera'},
      {value:'objects',   label:'3D objects & artefacts',  sub:'Physical items, costumes, tools, specimens'},
      {value:'av',        label:'Audio or video',          sub:'Film, recordings, oral histories, broadcasts'},
      {value:'born_digital', label:'Born-digital content', sub:'Digital-only files, websites, software'},
      {value:'mixed',     label:'Mixed or varied',         sub:'Significant variety across types'},
    ]
  },
  {
    section:1, id:'collection_size', type:'radio',
    text:'Roughly how large is your collection?',
    hint:'This helps gauge the scale of the challenge ahead.',
    options:[
      {value:'tiny',   label:'Under 1,000 items',      sub:'Relatively small, manageable collection'},
      {value:'small',  label:'1,000 – 10,000 items',   sub:''},
      {value:'medium', label:'10,000 – 100,000 items', sub:''},
      {value:'large',  label:'Over 100,000 items',      sub:'Large or major institutional collection'},
    ]
  },
  {
    section:1, id:'cms', type:'radio',
    text:'How do you currently manage your collection records?',
    hint:'Your current system affects how easily data can be exported and shared.',
    options:[
      {value:'none',       label:'No system',                       sub:'Mostly paper, physical labels, or in people\'s heads'},
      {value:'spreadsheet',label:'Spreadsheets or simple databases', sub:'Excel, Google Sheets, Airtable, etc.'},
      {value:'basic_cms',  label:'A collection management system',  sub:'Omeka, CollectiveAccess, Argus, TMS, Adlib, Axiell, etc.'},
      {value:'advanced',   label:'A CMS with API or export features',sub:'Already structured for data sharing and interoperability'},
    ]
  },
  {
    section:1, id:'collection_context', type:'open',
    text:'Is there anything specific or unusual about your collection that might affect how you open it?',
    hint:'e.g. Indigenous materials, sensitive content, complex provenance, donor restrictions, living artists.',
    placeholder:'e.g. Our archive includes materials donated by families with restrictions on commercial use, and some items relate to Indigenous communities who we are consulting with…',
    optional:true,
  },

  // ── SECTION 2: Digitisation ──
  {
    section:2, id:'digitized_pct', type:'slider',
    text:'What percentage of your collection is currently digitised?',
    hint:'Drag the slider to the closest estimate. Even a rough figure is helpful.',
    min:0, max:100, step:5, unit:'%',
    bands:[
      {label:'0–20%', min:0,  max:20,  stage_hint:'Digitisation is your first major step'},
      {label:'21–50%',min:21, max:50,  stage_hint:'Partial — prioritise your most significant items'},
      {label:'51–80%',min:51, max:80,  stage_hint:'Good progress — consider quality and metadata'},
      {label:'81–100%',min:81,max:100, stage_hint:'Strong foundation for open publishing'},
    ]
  },
  {
    section:2, id:'digitization_quality', type:'radio',
    text:'How would you describe the quality of your existing digital files?',
    hint:'Quality affects reusability — low-res files limit how others can use your collection.',
    options:[
      {value:'poor',    label:'Low resolution or inconsistent quality', sub:'Files exist but many aren\'t publication-ready'},
      {value:'mixed',   label:'Mixed quality',                          sub:'Some good files, others need rescanning'},
      {value:'good',    label:'Generally good quality',                 sub:'Most files are usable for web and publication'},
      {value:'archival',label:'Archival quality throughout',            sub:'High-res master files with consistent standards'},
    ]
  },
  {
    section:2, id:'metadata_quality', type:'radio',
    text:'How would you describe the quality of your collection metadata?',
    hint:'Good metadata makes collections discoverable and reusable by others.',
    options:[
      {value:'poor',   label:'Minimal or very inconsistent', sub:'Basic labels at best; significant gaps'},
      {value:'basic',  label:'Basic but incomplete',         sub:'Titles and dates exist; descriptions patchy'},
      {value:'good',   label:'Reasonably complete',          sub:'Most fields filled; following some standards'},
      {value:'rich',   label:'Rich and structured',          sub:'Consistent, standards-compliant, well-documented'},
    ]
  },

  // ── SECTION 3: Rights & Licensing ──
  {
    section:3, id:'rights_knowledge', type:'radio',
    text:'How confident are you about the copyright status of your collection?',
    hint:'Rights clarity is essential before you can open anything.',
    options:[
      {value:'none',    label:'I don\'t know where to start', sub:'Copyright feels complex and unfamiliar'},
      {value:'basic',   label:'I have a basic understanding', sub:'I know copyright exists but not how it applies to my collection'},
      {value:'partial', label:'I\'ve assessed parts of our collection', sub:'Rights documented for some items, gaps remain'},
      {value:'clear',   label:'We have a clear rights picture', sub:'Most items assessed, decisions documented'},
    ]
  },
  {
    section:3, id:'license_knowledge', type:'radio',
    text:'How familiar are you with Creative Commons licensing?',
    hint:'CC licenses are the primary tool for opening cultural collections.',
    options:[
      {value:'never',    label:'Never heard of it',          sub:''},
      {value:'heard',    label:'Heard of it but never used it', sub:'Familiar with the name, not the details'},

function getDimScores(answers) {
  const pct = parseInt(answers.digitized_pct) || 0;
  const digitisationScore = pct <= 20 ? 0 : pct <= 50 ? 1 : pct <= 80 ? 2 : 3;
  const rightsScore    = {none:0,basic:1,partial:2,clear:3}[answers.rights_knowledge] ?? 0;
  const licenseScore   = {never:0,heard:1,some:2,confident:3}[answers.license_knowledge] ?? 0;
  const metaScore      = {poor:0,basic:1,good:2,rich:3}[answers.metadata_quality] ?? 0;
  const techScore      = {low:0,basic:1,moderate:2,strong:3}[answers.tech_capacity] ?? 0;
  const opennessScore  = {start:0,exploring:1,pilot:2,active:3}[answers.current_openness] ?? 0;
  const cmsScore       = {none:0,spreadsheet:1,basic_cms:2,advanced:3}[answers.cms] ?? 0;
  const timeScore      = {none:0,low:1,moderate:2,high:3}[answers.team_time] ?? 0;
  return {digitisation:digitisationScore, rights:rightsScore, licensing:licenseScore,
          metadata:metaScore, technical:techScore, openness:opennessScore,
          cms:cmsScore, time:timeScore};
}

function computeStage(answers) {
  const s = getDimScores(answers);
  const total = Object.values(s).reduce((a,b)=>a+b,0);
  const t = STAGE_THRESHOLDS.find(t => total >= t.min && total <= t.max);
  return t ? t.stage : 6;
}

// ─── APP STATE ───────────────────────────────────────────────
let currentQ = 0;
let answers = {};
let showingMatrix = false;
const totalQ = QUESTIONS.length;

// ─── RENDER ──────────────────────────────────────────────────
function render() {
  if (showingMatrix) { renderMatrix(); return; }
  if (currentQ >= totalQ) { showResults(); return; }

  const q = QUESTIONS[currentQ];
  const section = SECTIONS[q.section];
  const pct = Math.round((currentQ / totalQ) * 100);
  document.getElementById('progress-label').textContent =
    `Section ${q.section+1} of ${SECTIONS.length}: ${section.label}`;
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';

  const canProceed = canAdvance(q);
  let bodyHTML = '';

  if (q.type === 'radio') {
    bodyHTML = `<div class="options">${q.options.map(opt => `
      <button class="option${answers[q.id]===opt.value?' selected':''}"
        data-value="${opt.value}" onclick="selectRadio('${q.id}','${opt.value}',this)">
        <div class="option-dot"></div>
        <div>
          <div class="option-label">${opt.label}</div>
          ${opt.sub?`<div class="option-sub">${opt.sub}</div>`:''}
        </div>
      </button>`).join('')}</div>`;
  } else if (q.type === 'multi') {
    const sel = answers[q.id] || [];
    bodyHTML = `<div class="options">${q.options.map(opt => `
      <button class="option checkbox${sel.includes(opt.value)?' selected':''}"
        data-value="${opt.value}" onclick="toggleMulti('${q.id}','${opt.value}',this)">
        <div class="option-dot"></div>
        <div>
          <div class="option-label">${opt.label}</div>
          ${opt.sub?`<div class="option-sub">${opt.sub}</div>`:''}
        </div>
      </button>`).join('')}</div>`;
  } else if (q.type === 'slider') {
    const val = answers[q.id] !== undefined ? answers[q.id] : 0;
    const bands = q.bands.map(b => {
      const active = val >= b.min && val <= b.max;
      return `<div class="slider-band${active?' active':''}">${b.label}</div>`;
    }).join('');
    bodyHTML = `
      <div class="slider-wrap">
        <div class="slider-value-display" id="slider-display">${val}<span>%</span></div>
        <div class="slider-labels"><span>0%</span><span>50%</span><span>100%</span></div>
        <input type="range" min="${q.min}" max="${q.max}" step="${q.step}" value="${val}"
          oninput="updateSlider('${q.id}',this.value)" />
        <div class="slider-bands" id="slider-bands">${bands}</div>
      </div>`;
  } else if (q.type === 'open') {
    const val = answers[q.id] || '';
    bodyHTML = `
      <div class="open-text-wrap">
        ${q.optional?'<div class="open-text-label">Your answer (optional)</div>':''}
        <textarea class="open-text" id="open-text-${q.id}"
          placeholder="${q.placeholder||''}"
          oninput="updateOpen('${q.id}',this.value)">${val}</textarea>
        ${q.optional?'<div class="open-text-optional">You can leave this blank and continue.</div>':''}
      </div>`;
  } else if (q.type === 'time') {
    const sel = answers[q.id];
    bodyHTML = `<div class="time-grid">${q.options.map(opt => `
      <button class="time-option${sel===opt.value?' selected':''}"
        onclick="selectRadio('${q.id}','${opt.value}',this)">
        <div class="time-option-icon">${opt.icon}</div>
        <div class="time-option-label">${opt.label}</div>
        <div class="time-option-sub">${opt.sub}</div>
      </button>`).join('')}</div>`;
  }

  document.getElementById('app').innerHTML = `
    <div class="section-label">${section.label}</div>
    <div class="card">
      <div class="question-number">Question ${currentQ+1} of ${totalQ}</div>
      <div class="question-text">${q.text}</div>
      ${q.hint?`<div class="question-hint">${q.hint}</div>`:''}
      ${bodyHTML}
      <div class="nav">
        <button class="btn btn-ghost" onclick="prevQ()" ${currentQ===0?'disabled':''}>← Back</button>
        <button class="btn btn-primary" id="next-btn" onclick="nextQ()" ${canProceed?'':'disabled'}>
          ${currentQ===totalQ-1?'See My Results →':'Next →'}
        </button>
      </div>
    </div>`;
}

function canAdvance(q) {
  if (q.type === 'radio' || q.type === 'time') return !!answers[q.id];
  if (q.type === 'multi') return (answers[q.id]||[]).length > 0;
  if (q.type === 'slider') return answers[q.id] !== undefined;
  if (q.type === 'open') return q.optional ? true : !!(answers[q.id]||'').trim();
  return true;
}

function selectRadio(qId, value, el) {
  answers[qId] = value;
  document.querySelectorAll('.option,.time-option').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  const nb = document.getElementById('next-btn');
  if (nb) nb.disabled = false;
}

function toggleMulti(qId, value, el) {
  if (!answers[qId]) answers[qId] = [];
  const idx = answers[qId].indexOf(value);
  if (idx > -1) { answers[qId].splice(idx,1); el.classList.remove('selected'); }
  else { answers[qId].push(value); el.classList.add('selected'); }
  const nb = document.getElementById('next-btn');
  if (nb) nb.disabled = answers[qId].length === 0;
}

function updateSlider(qId, value) {
  answers[qId] = parseInt(value);
  const disp = document.getElementById('slider-display');
  if (disp) disp.innerHTML = `${value}<span>%</span>`;
  // update bands
  const q = QUESTIONS[currentQ];
  const bands = q.bands.map(b => {
    const active = parseInt(value) >= b.min && parseInt(value) <= b.max;
    return `<div class="slider-band${active?' active':''}">${b.label}</div>`;
  }).join('');
  const bc = document.getElementById('slider-bands');
  if (bc) bc.innerHTML = bands;
  const nb = document.getElementById('next-btn');
  if (nb) nb.disabled = false;
}

function updateOpen(qId, value) {
  answers[qId] = value;
  const q = QUESTIONS.find(q=>q.id===qId);
  if (q && !q.optional) {
    const nb = document.getElementById('next-btn');
    if (nb) nb.disabled = !value.trim();
  }
}

function nextQ() {
  const q = QUESTIONS[currentQ];
  if (!canAdvance(q)) return;
  // Init slider default
  if (q.type==='slider' && answers[q.id]===undefined) answers[q.id]=0;
  currentQ++;
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

function prevQ() {
  if (currentQ > 0) { currentQ--; render(); }
  window.scrollTo({top:0,behavior:'smooth'});
}

// ─── MATRIX VIEW ─────────────────────────────────────────────
function renderMatrix() {
  document.getElementById('progress-wrap').style.display='none';
  const dimScores = getDimScores(answers);
  const myStage = computeStage(answers);
  const myTotal = Object.values(dimScores).reduce((a,b)=>a+b,0);

  // Build table rows for each stage threshold
  const rows = STAGE_THRESHOLDS.map(t => {
    const isMe = t.stage === myStage;
    const stageD = STAGE_DATA[t.stage];
    const rangeLabel = t.min === t.max ? `${t.min}` : `${t.min}–${t.max}`;
    // Typical profile for each stage
    const profiles = [
      'Low digitisation · Rights unclear · No CMS · Limited capacity',
      'Some digitisation · Basic rights awareness · Spreadsheets · Exploring options',
      'Partial digitisation · Rights partially assessed · Basic CMS · Some CC knowledge',
      'Mostly digitised · Rights clear · Good metadata · Publishing ready',
      'Fully digitised · Rights documented · Strong metadata · Collection online',
      'Fully digitised · Rights expert · Rich metadata · Leading the field',
    ];
    return `<tr class="${isMe?'my-row':''}">
      <td><span class="stage-pill-sm" style="background:${isMe?'#007a6e':'#f7f5f0'};color:${isMe?'white':'#6b7280'};border:1px solid ${isMe?'#007a6e':'#e2ddd6'}">${stageD.emoji} ${t.label}</span>${isMe?' ← <strong>You are here</strong>':''}</td>
      <td style="color:#6b7280;font-size:12px">${rangeLabel} / 24</td>
      <td style="color:#6b7280;font-size:12px">${profiles[t.stage-1]}</td>
    </tr>`;
  }).join('');

  // Dimension breakdown for this user
  const dimRows = MATRIX_DIMS.map(d => {
    const score = dimScores[d.id] ?? 0;
    const scoreLabel = d.scores[score]?.label || '';
    const bars = [0,1,2,3].map(i =>
      `<div style="width:18px;height:18px;border-radius:3px;display:inline-block;margin-right:3px;
        background:${i<=score?d.color:'#e2ddd6'}"></div>`
    ).join('');
    return `<tr>
      <td><span style="color:${d.color};font-weight:600;font-size:13px">${d.label}</span><br><span style="font-size:11px;color:#6b7280">${d.desc}</span></td>
      <td>${bars}<br><span style="font-size:11px;color:#6b7280">${scoreLabel}</span></td>
      <td style="text-align:center;font-size:15px;font-weight:700;color:${d.color}">${score}/3</td>
    </tr>`;
  }).join('');

  document.getElementById('app').innerHTML = `
    <div class="matrix-wrap">
      <div class="matrix-title">Your Decision Matrix</div>
      <div class="matrix-sub">This table shows how your scores across eight dimensions map to the six stages of the CC Open Heritage Companion. Your highlighted row shows where you land.</div>

      <div class="results-section-title" style="margin-bottom:10px">Stage Placement — Score Ranges</div>
      <table class="matrix-table" style="margin-bottom:24px">
        <thead><tr>
          <th>Stage</th><th>Score Range</th><th>Typical Profile</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>

      <div class="results-section-title" style="margin-bottom:10px">Your Dimension Scores (total: ${myTotal}/24)</div>
      <table class="matrix-table" style="margin-bottom:24px">
        <thead><tr>
          <th>Dimension</th><th>Your Level</th><th>Score</th>
        </tr></thead>
        <tbody>${dimRows}</tbody>
      </table>

      <div style="font-size:13px;color:var(--muted);background:var(--teal-light);border:1px solid var(--teal-mid);border-radius:10px;padding:14px;line-height:1.6;margin-bottom:20px">
        💡 <strong>Remember:</strong> Stages are a guide, not a judgement. Organisations can work on multiple dimensions simultaneously, and progress doesn't always happen in order. Your lowest-scoring dimensions show where to focus your capacity-building energy first.
      </div>

      <button class="matrix-back-btn" onclick="backFromMatrix()">← Back to my results</button>
    </div>`;
}

function backFromMatrix() {
  showingMatrix = false;
  showResults();
  window.scrollTo({top:0,behavior:'smooth'});
}

// ─── RESULTS ─────────────────────────────────────────────────
function showResults() {
  showingMatrix = false;
  document.getElementById('progress-wrap').style.display='none';
  const stage = computeStage(answers);
  const data = STAGE_DATA[stage];

  const stageSteps = [1,2,3,4,5,6].map(n => {
    const lbs = ['Under-\nstanding','Choosing','Preparing','Sharing','Impacting','Leading'];
    let cls = n < stage ? 'done' : n === stage ? 'active' : '';
    return `<div class="stage-step ${cls}"><span class="stage-num">${n}</span>${lbs[n-1]}</div>`;
  }).join('');

  const priorities = data.priorities.map(p=>`
    <div class="priority-item">
      <div class="priority-icon">${p.icon}</div>
      <div><div class="priority-title">${p.title}</div><div class="priority-desc">${p.desc}</div></div>
    </div>`).join('');

  const resources = data.resources.map(r=>`
    <div class="resource-item">
      <div class="resource-icon">${r.icon}</div>
      <div>
        <a class="resource-name" href="${r.url}" target="_blank" rel="noopener">${r.name} ↗</a>
        <div class="resource-why">${r.why}</div>
      </div>
    </div>`).join('');

  // Profile chips
  const orgMap = {museum:'Museum',gallery:'Gallery',library:'Library',archive:'Archive',
    museum_archive:'Archive in Museum',community:'Community Org',individual:'Individual',other:'Other'};
  const orgTypes = (answers.org_type||[]).map(v=>orgMap[v]||v).join(' + ');
  const timeMap = {none:'Very limited capacity',low:'A few hrs/month',moderate:'A few hrs/week',high:'Open access is a priority'};
  const barrierMap = {knowledge:'Building Knowledge',rights:'Rights & Legal',capacity:'Capacity',
    buyin:'Getting Buy-in',technical:'Tech Infrastructure',metadata:'Metadata Gaps',ethics:'Ethical Concerns'};
  const barriers = (answers.biggest_barrier||[]).map(v=>barrierMap[v]||v).join(' · ');
  const pct = answers.digitized_pct !== undefined ? answers.digitized_pct+'% digitised' : '';

  const chips = [
    orgTypes && {label:orgTypes, h:true},
    answers.org_size && {label:{solo:'Solo',small:'Small team',medium:'Medium org',large:'Large org'}[answers.org_size], h:false},
    pct && {label:pct, h:false},
    answers.team_time && {label:timeMap[answers.team_time], h:false},
    barriers && {label:'Barriers: '+barriers, h:true},
  ].filter(Boolean).map(c=>
    `<span class="profile-chip${c.h?' highlight':''}">${c.label}</span>`
  ).join('');

  // Open-ended reflections
  const reflections = [
    {q:'Your organisation\'s mission', a:answers.org_mission},
    {q:'Specific collection considerations', a:answers.collection_context},
    {q:'Your vision for the collection online', a:answers.tech_wishes},
    {q:'What success looks like for you', a:answers.hopes},
    {q:'Specific rights challenges', a:answers.rights_notes},
  ].filter(r=>r.a && r.a.trim());

  const reflectionHTML = reflections.length ? `
    <div class="results-section-title">Your Reflections</div>
    <div class="reflection-box">
      <h4>What you shared — Orla will use this to personalise its guidance</h4>
      ${reflections.map(r=>`
        <div class="reflection-item">
          <div class="reflection-q">${r.q}</div>
          ${r.a}
        </div>`).join('')}
    </div>` : '';

  document.getElementById('app').innerHTML = `
    <div class="results-card">
      <div class="results-hero">
        <div class="results-eyebrow">Your Open Access Stage</div>
        <div class="results-stage-name">${data.emoji} ${data.name}</div>
        <div class="results-stage-desc">${data.desc}</div>
      </div>
      <div class="results-body">
        <div class="results-section-title">Your Journey Map</div>
        <div class="stage-map">${stageSteps}</div>

        <div class="results-section-title">Your Profile</div>
        <div class="profile-chips">${chips}</div>

        <button class="view-matrix-btn" onclick="viewMatrix()">📊 View your decision matrix & dimension scores</button>

        <div class="results-section-title">Your Priorities at This Stage</div>
        <div class="priorities">${priorities}</div>

        <div class="results-section-title">Start With These Resources</div>
        <div class="resource-list">${resources}</div>

        ${reflectionHTML}

        <div class="results-section-title">Continue With Orla</div>
        <div class="orla-cta">
          <div class="cta-avatar">O</div>
          <div class="cta-text">
            <div class="cta-title">Get personalised guidance from Orla</div>
            <div class="cta-desc">Orla will pick up exactly where this assessment leaves off — with resources, training, and next steps tailored to your stage and context.</div>
          </div>
          <button class="cta-btn" onclick="openOrla()">Ask Orla →</button>
        </div>
        <button class="restart-btn" onclick="restartAssessment()">↺ Retake the assessment</button>
      </div>
    </div>`;

  window.scrollTo({top:0,behavior:'smooth'});
  window._orlaPrompt = buildOrlaPrompt(data, stage);
}

function buildOrlaPrompt(data, stage) {
  const orgTypes = (answers.org_type||[]).join(', ');
  const pct = answers.digitized_pct !== undefined ? answers.digitized_pct+'%' : 'unknown';
  const barriers = (answers.biggest_barrier||[]).join(', ');
  const hopes = answers.hopes || '';
  const notes = [answers.collection_context, answers.rights_notes, answers.tech_wishes].filter(Boolean).join(' ');

  return `I've just completed the Orla self-assessment. Here's my profile:
- Organisation type: ${orgTypes}
- Stage placement: ${data.name}
- Digitisation: ${pct} of collection digitised
- Biggest barriers: ${barriers}
- My vision: ${hopes}
${notes ? '- Additional context: '+notes : ''}

Based on this, where should I focus first, and what are the most important next steps for me at ${data.name}?`;
}

function viewMatrix() {
  showingMatrix = true;
  renderMatrix();
  window.scrollTo({top:0,behavior:'smooth'});
}

function openOrla() {
  const prompt = window._orlaPrompt || 'I just completed the Orla self-assessment. Can you help me with my next steps?';
  window.open('Orla-Public.html?prompt=' + encodeURIComponent(prompt), '_blank');
}

function restartAssessment() {
  currentQ = 0; answers = {}; showingMatrix = false;
  document.getElementById('progress-wrap').style.display='block';
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

// Init
render();
</script>
</body>
</html>
